<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="Index.html">My Project</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="Index.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="CV.html">Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="City.html">My City</a></li>
                    <li class="nav-item"><a class="nav-link" href="Heritage.html">Heritage</a></li>
                    <li class="nav-item"><a class="nav-link" href="Interests.html">Interests</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="Login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="app" class="container mt-5 mb-5">
        <h2 class="mb-4 border-bottom pb-2">Contact Me</h2>
        
        <form id="contactForm" action="Process-Contact.php" method="POST" class="bg-white p-4 shadow-sm border rounded">
            
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" name="name" v-model="formData.name" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" name="email" v-model="formData.email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Subject</label>
                <select id="subject" name="subject" v-model="formData.subject" class="form-select">
                    <option value="">Please select a subject</option>
                    <option value="Question">Question about me</option>
                    <option value="Job Offer">Job Offer</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Your Message</label>
                <textarea id="message" name="message" v-model="formData.message" class="form-control" rows="4" placeholder="Type your message here..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" v-model="formData.gender">
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female" v-model="formData.gender">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="terms" id="terms" v-model="formData.terms">
                    <label class="form-check-label" for="terms">I have read and agree to the terms and conditions</label>
                </div>
            </div>

            <hr>

            <div class="d-flex gap-3">
                <button type="button" class="btn btn-primary" onclick="validateVanillaJS()">Check with Vanilla JS</button>
                
                <button type="button" class="btn btn-success" @click="validateVueJS">Check with Vue.js</button>
            </div>
            
            <div id="vanilla-msg" class="mt-3 fw-bold"></div>
            <div v-if="vueMessage" class="mt-3 fw-bold" :class="vueMessageClass">{{ vueMessage }}</div>

            <div class="mt-4 text-end">
                <button type="submit" class="btn btn-dark btn-lg">Send Message</button>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Library.js"></script>
    <script>
        function validateVanillaJS() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;
            const terms = document.getElementById('terms').checked;
            const msgBox = document.getElementById('vanilla-msg');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (name.trim() === '' || email.trim() === '' || subject === '' || message.trim() === '') {
                msgBox.innerHTML = '<span class="text-danger">Vanilla JS: Please fill in all required fields (Name, Email, Subject, Message)!</span>';
            } else if (!emailRegex.test(email)) {
                msgBox.innerHTML = '<span class="text-danger">Vanilla JS: Please enter a valid email address!</span>';
            } else if (!terms) {
                msgBox.innerHTML = '<span class="text-danger">Vanilla JS: You must agree to the terms and conditions!</span>';
            } else {
                msgBox.innerHTML = '<span class="text-success">Vanilla JS: Validation Successful! You can now send the message.</span>';
            }
        }
    </script>
</body>
</html>
